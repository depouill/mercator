name: Deploy docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --clean

      - name: Fetch gh-pages Helm index
        run: |
          git fetch origin gh-pages
          git show origin/gh-pages:index.yaml > /tmp/ghpages-index.yaml 2>/dev/null || true

      - name: Merge Helm indexes
        shell: python
        run: |
          import yaml, os

          def load(path):
              if not os.path.exists(path) or os.path.getsize(path) == 0: return {}
              with open(path) as f: return yaml.safe_load(f) or {}

          ghpages = load('/tmp/ghpages-index.yaml')
          local   = load('docs/_helm_chart/index/index.yaml')

          entries = {}
          for e in (ghpages.get('entries', {}).get('mercator') or []):
              entries[e['version']] = e
          for e in (local.get('entries', {}).get('mercator') or []):
              entries[e['version']] = e

          result = {
              'apiVersion': 'v1',
              'entries': {'mercator': sorted(entries.values(), key=lambda x: x['version'], reverse=True)},
              'generated': max(ghpages.get('generated', ''), local.get('generated', ''))
          }
          with open('site/index.yaml', 'w') as f:
              yaml.dump(result, f, default_flow_style=False, allow_unicode=True)

      - name: Deploy to GitHub Pages
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          ghp-import --no-jekyll --push --force site
